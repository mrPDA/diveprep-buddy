name: Deploy to Cloudflare Pages

on:
  workflow_dispatch:

# Primary deploy path: Cloudflare Pages → Connect Git (see docs/deploy.md).
# Run this workflow manually after adding CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID secrets.

concurrency:
  group: cloudflare-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=diveprep-buddy --commit-dirty=true
